name: CI/CD - Build and Deploy MEAN App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest ./backend

      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest

      - name: Build Frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest ./frontend

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}

          script: |
            cd mean-stack-devops
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker image prune -f
            docker image prune -fr-compose down
            docker-compose up -d
            docker image prune -f
