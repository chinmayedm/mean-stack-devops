name: CI/CD - Build and Deploy MEAN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build Backend Image
      - name: Build Backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest ./backend

      # 4️⃣ Push Backend Image
      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest

      # 5️⃣ Build Frontend Image
      - name: Build Frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest ./frontend

      # 6️⃣ Push Frontend Image
      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest

      # 7️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd mean-stack-devops
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker image prune -f
